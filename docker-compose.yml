# docker-compose.yml — PostgreSQL for Agentic-AFL Spec Store.
#
# Usage:
#   docker compose up -d
#
# This spins up a PostgreSQL 16 container with:
#   - The intarray extension (for INTEGER[] operations in Jaccard function)
#   - Persistent volume for data
#   - Default credentials matching config.py defaults
#
# For production / Proxmox deployment, provision via Terraform instead.

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentic_afl_db
    environment:
      POSTGRES_USER: agentic_afl
      POSTGRES_PASSWORD: agentic_afl
      POSTGRES_DB: agentic_afl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic_afl"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
